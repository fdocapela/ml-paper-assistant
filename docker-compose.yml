services:
  chromadb:
    image: chromadb/chroma:0.5.4
    container_name: ml_chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ml_assistant
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/data
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - SQLITE_DB_PATH=/data/threads.db
    env_file:
      - .env
    depends_on:
      chromadb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  chroma_data:
  sqlite_data:
